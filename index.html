<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GH-900 GitHub Foundations Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', system-ui, sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .choice-btn { transition: background-color 0.15s, border-color 0.15s; }
    .choice-btn.selected { border-color: #1d4ed8; background-color: #eff6ff; }
    .choice-btn.correct  { border-color: #16a34a; background-color: #f0fdf4; }
    .choice-btn.wrong    { border-color: #dc2626; background-color: #fef2f2; }
    .choice-btn.reveal-correct { border-color: #16a34a; background-color: #f0fdf4; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- Fixed Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100">
    <div class="max-w-2xl mx-auto px-6 h-14 flex items-center justify-between">
      <button id="nav-brand" class="text-sm font-medium tracking-widest uppercase hover:text-gray-500 transition-colors">gh-900</button>
      <div id="nav-right" class="flex items-center gap-6 text-xs text-gray-400">
        <button id="nav-home-btn" class="hover:text-gray-900 transition-colors hidden">← ホーム</button>
        <span id="nav-quiz-info" class="hidden"></span>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 pt-24 pb-24">

    <!-- ===== HOME SCREEN ===== -->
    <div id="screen-home" class="screen active">

      <div class="mb-12">
        <p class="text-xs tracking-widest uppercase text-gray-400 mb-2">GitHub Foundations</p>
        <h1 class="text-2xl font-light tracking-tight mb-3">GH-900 Trainer <span class="text-sm text-gray-400 font-normal">β</span></h1>
        <p class="text-sm text-gray-500 leading-relaxed">GH-900 認定試験の対策問題集です。7つのドメインから問題を選んで学習できます。学習履歴はブラウザに保存されます。</p>
      </div>

      <!-- Overall Progress -->
      <div class="mb-10">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs tracking-widest uppercase text-gray-400">Overall Progress</p>
          <p id="overall-accuracy" class="text-xs text-gray-400">--</p>
        </div>
        <div class="h-1 bg-gray-100 rounded-full overflow-hidden">
          <div id="overall-progress-bar" class="h-full bg-gray-900 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="overall-answered" class="text-xs text-gray-400 mt-1.5"></p>
      </div>

      <!-- Domain List -->
      <div class="mb-8">
        <p class="text-xs tracking-widest uppercase text-gray-400 mb-6">Domains</p>
        <div id="domain-list" class="divide-y divide-gray-100"></div>
      </div>

      <div class="pt-6">
        <button id="start-all-btn" class="w-full py-3 text-sm border border-gray-200 rounded hover:bg-gray-50 transition-colors text-gray-700">
          全ドメインをランダムに解く
        </button>
      </div>
    </div>

    <!-- ===== QUIZ SCREEN ===== -->
    <div id="screen-quiz" class="screen">

      <!-- Progress -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-3">
          <span id="quiz-domain-label" class="text-xs tracking-widest uppercase text-gray-400"></span>
          <span id="quiz-progress-text" class="text-xs text-gray-400"></span>
        </div>
        <div class="h-0.5 bg-gray-100 rounded-full overflow-hidden">
          <div id="quiz-progress-bar" class="h-full bg-gray-900 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <!-- Question -->
      <div class="mb-8">
        <span id="quiz-difficulty-badge" class="inline-block text-xs text-gray-400 border border-gray-200 rounded px-2 py-0.5 mb-4"></span>
        <p id="quiz-question" class="text-base leading-relaxed"></p>
      </div>

      <!-- Choices -->
      <div id="quiz-choices" class="space-y-2.5 mb-8"></div>

      <!-- Explanation (shown after answer) -->
      <div id="quiz-explanation" class="hidden">
        <div id="quiz-result-row" class="flex items-center gap-2 mb-5">
          <span id="quiz-result-icon" class="text-xl"></span>
          <span id="quiz-result-text" class="text-sm font-medium"></span>
        </div>
        <div class="border border-gray-100 rounded p-5 mb-4">
          <p class="text-xs tracking-widest uppercase text-gray-400 mb-2">解説</p>
          <p id="quiz-explanation-text" class="text-sm text-gray-700 leading-relaxed"></p>
        </div>
        <div id="quiz-references" class="mb-7 space-y-1"></div>
        <button id="quiz-next-btn" class="w-full py-3 text-sm bg-gray-900 text-white rounded hover:bg-gray-700 transition-colors">
          次の問題へ
        </button>
      </div>
    </div>

    <!-- ===== SUMMARY SCREEN ===== -->
    <div id="screen-summary" class="screen">

      <div class="mb-10">
        <p class="text-xs tracking-widest uppercase text-gray-400 mb-2">Result</p>
        <h2 class="text-2xl font-light tracking-tight">演習完了</h2>
      </div>

      <div class="mb-10 text-center py-10 border border-gray-100 rounded">
        <p id="summary-score" class="text-6xl font-light mb-1">--%</p>
        <p class="text-sm text-gray-400">正答率</p>
        <p id="summary-count" class="text-xs text-gray-400 mt-1"></p>
      </div>

      <div class="mb-8">
        <p class="text-xs tracking-widest uppercase text-gray-400 mb-5">ドメイン別結果</p>
        <div id="summary-domains" class="space-y-4"></div>
      </div>

      <div class="space-y-3 pt-6 border-t border-gray-100">
        <button id="summary-retry-btn" class="w-full py-3 text-sm border border-gray-200 rounded hover:bg-gray-50 transition-colors text-gray-700">
          同じ問題をもう一度
        </button>
        <button id="summary-wrong-btn" class="w-full py-3 text-sm border border-gray-200 rounded hover:bg-gray-50 transition-colors text-gray-700">
          間違えた問題を復習する
        </button>
        <button id="summary-home-btn" class="w-full py-3 text-sm text-gray-400 hover:text-gray-900 transition-colors">
          ホームへ戻る
        </button>
      </div>
    </div>

  </main>

  <script>
    // ─── Domain definitions ──────────────────────────────────────────────

    // ─── Sample questions (mock: 13 questions) ───────────────────────────
    const QUESTIONS = [

          { id: 'D', text: 'Pull Requestをマージする操作' },

        correctChoiceIds: ['B'],
        explanation: 'コミットはリポジトリの変更履歴の最小単位であり、「誰が・いつ・どんな変更をしたか」を記録したスナップショットです。各コミットにはユニークなSHA-1ハッシュが付与され、履歴をさかのぼったり特定の状態に戻すことができます。',
        references: [{ title: 'About commits', url: 'https://docs.github.com/en/pull-requests/committing-changes-to-your-project/creating-and-editing-commits/about-commits', source: 'GitHub Docs' }],
      },
      {
        id: 'D1-002', domainId: 'D1', difficulty: 'basic',
        question: 'ブランチ（branch）の主な目的として最も適切なものはどれですか？',
        choices: [
          { id: 'A', text: 'リポジトリを外部に公開するため' },
          { id: 'B', text: 'メインのコードに影響を与えずに独立した作業を並行して進めるため' },
          { id: 'C', text: 'Organizationのメンバーを管理するため' },
          { id: 'D', text: 'GitHub Pagesのカスタムドメインを設定するため' },
        ],
        correctChoiceIds: ['B'],
        explanation: 'ブランチはコミット履歴のポインタであり、メインブランチ（main / master）から分岐して独立した作業空間を作ります。機能開発やバグ修正をブランチ上で進め、レビュー後にマージすることで安全なリリースが可能になります。',
        references: [{ title: 'About branches', url: 'https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/about-branches', source: 'GitHub Docs' }],
      },
      {
        id: 'D1-003', domainId: 'D1', difficulty: 'standard',
        question: 'GitHub Flow の基本的なステップの順序として正しいものはどれですか？',
        choices: [
          { id: 'A', text: 'ブランチ作成 → コミット → Pull Request → レビュー → マージ' },
          { id: 'B', text: 'Fork → Pull Request → ブランチ作成 → マージ' },
          { id: 'C', text: 'タグ作成 → コミット → ブランチ作成 → マージ' },
          { id: 'D', text: 'リリース → ブランチ作成 → コミット → クローズ' },
        ],
        correctChoiceIds: ['A'],
        explanation: 'GitHub Flow は「ブランチを切る → コミットを積む → Pull Request を開く → レビュー・議論 → main にマージ → デプロイ」というシンプルなサイクルです。mainブランチは常にデプロイ可能な状態を保つことが前提です。',
        references: [{ title: 'GitHub flow', url: 'https://docs.github.com/en/get-started/using-github/github-flow', source: 'GitHub Docs' }],
      },
      {
        id: 'D2-001', domainId: 'D2', difficulty: 'basic',
        question: 'CODEOWNERSファイルの主な役割として最も適切なものはどれですか？',

          { id: 'A', text: 'リポジトリの料金プランを管理する' },
          { id: 'B', text: '特定のファイルやディレクトリへの変更時に自動的にレビュアーを割り当てる' },

        references: [{ title: 'About code owners', url: 'https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners', source: 'GitHub Docs' }],
      },
      {
        id: 'D3-001', domainId: 'D3', difficulty: 'basic',

          { id: 'B', text: '変更を提案し、レビューと議論を経てマージするため' },

        references: [{ title: 'About discussions', url: 'https://docs.github.com/en/discussions/collaborating-with-your-community-using-discussions/about-discussions', source: 'GitHub Docs' }],

    // ─── Helpers ─────────────────────────────────────────────────────────
    const DIFFICULTY_LABEL = { basic: '基礎', standard: '標準', advanced: '応用' };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── LocalStorage ────────────────────────────────────────────────────
    const LS_KEY = 'gh900-history-v1';

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
    }

    function saveAnswer(questionId, selectedId, isCorrect) {
      const h = loadHistory();
      const prev = h[questionId] || { attempts: 0, correctCount: 0 };
      h[questionId] = {
        attempts: prev.attempts + 1,
        correctCount: prev.correctCount + (isCorrect ? 1 : 0),
        lastAnsweredAt: new Date().toISOString(),
        lastCorrect: isCorrect,
      };
      localStorage.setItem(LS_KEY, JSON.stringify(h));
    }

    // ─── App state ───────────────────────────────────────────────────────
    let quiz = { questions: [], index: 0, answers: [] };
    let lastDomainFilter = null;

    // ─── Screen management ───────────────────────────────────────────────
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`screen-${name}`).classList.add('active');
      const isHome = name === 'home';
      document.getElementById('nav-home-btn').classList.toggle('hidden', isHome);
      document.getElementById('nav-quiz-info').classList.toggle('hidden', name !== 'quiz');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ─── Home ────────────────────────────────────────────────────────────
    function renderHome() {
      const history = loadHistory();
      const totalQ = QUESTIONS.length;
      const answered = Object.keys(history).length;
      const correct = Object.values(history).filter(h => h.lastCorrect).length;

      // Overall
      document.getElementById('overall-progress-bar').style.width =
        totalQ ? `${Math.round((answered / totalQ) * 100)}%` : '0%';
      document.getElementById('overall-accuracy').textContent =
        answered ? `${Math.round((correct / answered) * 100)}% 正解` : '未回答';
      document.getElementById('overall-answered').textContent =
        `${answered} / ${totalQ} 問回答済み`;

      // Domain list
      const el = document.getElementById('domain-list');
      el.innerHTML = '';
      DOMAINS.forEach(d => {
        const domainQs = QUESTIONS.filter(q => q.domainId === d.id);
        const domainAnswered = domainQs.filter(q => history[q.id]).length;
        const domainCorrect = domainQs.filter(q => history[q.id]?.lastCorrect).length;
        const pct = domainAnswered ? Math.round((domainCorrect / domainAnswered) * 100) : null;
        const progress = domainQs.length ? Math.round((domainAnswered / domainQs.length) * 100) : 0;

        const isWeak = pct !== null && pct < 60;

        const div = document.createElement('div');
        div.innerHTML = `
          <button class="block w-full text-left group -mx-3 px-3 py-4 rounded hover:bg-gray-50 transition-colors" data-domain="${d.id}">
            <div class="flex items-start justify-between gap-4">
              <div class="min-w-0">
                <p class="text-xs text-gray-400 mb-0.5">${d.id} · ${d.ratio}%</p>
                <p class="text-sm group-hover:text-gray-600 transition-colors truncate">${d.name}</p>
              </div>
              <div class="text-right flex-shrink-0">
                <p class="text-xs text-gray-400">${domainAnswered}/${domainQs.length}問</p>
                <p class="text-xs ${isWeak ? 'text-red-400' : 'text-gray-400'}">${pct !== null ? pct + '%' : '--'}</p>
              </div>
            </div>
            <div class="mt-2 h-0.5 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full ${isWeak ? 'bg-red-300' : 'bg-gray-300'} rounded-full transition-all" style="width: ${progress}%"></div>
            </div>
          </button>`;
        el.appendChild(div);

        div.querySelector('button').addEventListener('click', () => startQuiz(d.id));
      });
    }

    // ─── Quiz ────────────────────────────────────────────────────────────
    function startQuiz(domainId) {
      lastDomainFilter = domainId;
      const pool = domainId
        ? QUESTIONS.filter(q => q.domainId === domainId)
        : [...QUESTIONS];
      quiz = { questions: shuffle(pool), index: 0, answers: [] };
      showScreen('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = quiz.questions[quiz.index];
      const total = quiz.questions.length;
      const pct = Math.round(((quiz.index) / total) * 100);

      // Progress
      document.getElementById('quiz-progress-bar').style.width = `${pct}%`;
      document.getElementById('quiz-progress-text').textContent = `${quiz.index + 1} / ${total}`;

      // Domain label
      const d = DOMAINS.find(d => d.id === q.domainId);
      document.getElementById('quiz-domain-label').textContent = d ? d.id + ' · ' + d.name : '';
      document.getElementById('nav-quiz-info').textContent = `${quiz.index + 1} / ${total}`;

      // Difficulty
      document.getElementById('quiz-difficulty-badge').textContent =
        DIFFICULTY_LABEL[q.difficulty] || q.difficulty;

      // Question
      document.getElementById('quiz-question').textContent = q.question;

      // Choices (shuffled)
      const choicesEl = document.getElementById('quiz-choices');
      choicesEl.innerHTML = '';
      shuffle(q.choices).forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn w-full text-left px-4 py-3 border border-gray-200 rounded text-sm leading-relaxed hover:border-gray-400 hover:bg-gray-50';
        btn.dataset.id = c.id;
        btn.textContent = c.text;
        btn.addEventListener('click', () => selectChoice(c.id));
        choicesEl.appendChild(btn);
      });

      // Hide explanation
      document.getElementById('quiz-explanation').classList.add('hidden');
    }

    function selectChoice(selectedId) {
      const q = quiz.questions[quiz.index];
      const isCorrect = q.correctChoiceIds.includes(selectedId);

      // Save
      saveAnswer(q.id, selectedId, isCorrect);
      quiz.answers.push({ questionId: q.id, domainId: q.domainId, selectedId, isCorrect });

      // Style choices
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.disabled = true;
        const id = btn.dataset.id;
        if (q.correctChoiceIds.includes(id)) {
          btn.classList.add('reveal-correct');
        } else if (id === selectedId && !isCorrect) {
          btn.classList.add('wrong');
        }
      });

      // Show explanation
      const expEl = document.getElementById('quiz-explanation');
      expEl.classList.remove('hidden');

      document.getElementById('quiz-result-icon').textContent = isCorrect ? '✓' : '✗';
      document.getElementById('quiz-result-text').textContent = isCorrect ? '正解！' : '不正解';
      document.getElementById('quiz-result-text').className =
        `text-sm font-medium ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
      document.getElementById('quiz-result-icon').className =
        `text-xl ${isCorrect ? 'text-green-600' : 'text-red-600'}`;

      document.getElementById('quiz-explanation-text').textContent = q.explanation;

      // References
      const refEl = document.getElementById('quiz-references');
      refEl.innerHTML = '';
      (q.references || []).forEach(r => {
        const a = document.createElement('a');
        a.href = r.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'inline-flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-700 border border-gray-200 rounded px-2.5 py-1 transition-colors';
        a.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>${r.title} — ${r.source}`;
        refEl.appendChild(a);
      });

      // Next button label
      const nextBtn = document.getElementById('quiz-next-btn');
      nextBtn.textContent = quiz.index + 1 < quiz.questions.length ? '次の問題へ' : '結果を見る';
    }

    document.getElementById('quiz-next-btn').addEventListener('click', () => {
      if (quiz.index + 1 < quiz.questions.length) {
        quiz.index++;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        showSummary();
      }
    });

    // ─── Summary ─────────────────────────────────────────────────────────
    function showSummary() {
      showScreen('summary');

      const total = quiz.answers.length;
      const correct = quiz.answers.filter(a => a.isCorrect).length;
      const pct = total ? Math.round((correct / total) * 100) : 0;

      document.getElementById('summary-score').textContent = `${pct}%`;
      document.getElementById('summary-count').textContent = `${correct} / ${total} 問正解`;

      // Domain breakdown
      const domainsEl = document.getElementById('summary-domains');
      domainsEl.innerHTML = '';
      const usedDomains = [...new Set(quiz.answers.map(a => a.domainId))];
      usedDomains.forEach(domainId => {
        const d = DOMAINS.find(d => d.id === domainId);
        const ans = quiz.answers.filter(a => a.domainId === domainId);
        const c = ans.filter(a => a.isCorrect).length;
        const p = Math.round((c / ans.length) * 100);
        const isWeak = p < 60;

        const div = document.createElement('div');
        div.innerHTML = `
          <div class="flex items-center justify-between mb-1.5">
            <p class="text-xs text-gray-600">${d?.id} ${d?.name}</p>
            <p class="text-xs ${isWeak ? 'text-red-500' : 'text-gray-500'}">${c}/${ans.length} (${p}%)</p>
          </div>
          <div class="h-0.5 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full ${isWeak ? 'bg-red-400' : 'bg-gray-400'} rounded-full" style="width: ${p}%"></div>
          </div>`;
        domainsEl.appendChild(div);
      });
    }

    // ─── Event bindings ──────────────────────────────────────────────────
    document.getElementById('nav-brand').addEventListener('click', () => {
      renderHome();
      showScreen('home');
    });
    document.getElementById('nav-home-btn').addEventListener('click', () => {
      renderHome();
      showScreen('home');
    });
    document.getElementById('start-all-btn').addEventListener('click', () => startQuiz(null));
    document.getElementById('summary-home-btn').addEventListener('click', () => {
      renderHome();
      showScreen('home');
    });
    document.getElementById('summary-retry-btn').addEventListener('click', () => startQuiz(lastDomainFilter));
    document.getElementById('summary-wrong-btn').addEventListener('click', () => {
      const wrongIds = quiz.answers.filter(a => !a.isCorrect).map(a => a.questionId);
      if (!wrongIds.length) return;
      const wrongQs = QUESTIONS.filter(q => wrongIds.includes(q.id));
      quiz = { questions: shuffle(wrongQs), index: 0, answers: [] };
      showScreen('quiz');
      renderQuestion();
    });

    // ─── Init ─────────────────────────────────────────────────────────────
    renderHome();
  </script>
</body>
</html>

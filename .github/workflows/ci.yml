name: Validate Questions

on:
  pull_request:
    paths:
      - 'src/data/questions/**.json'
      - 'docs/schema/question.schema.json'
      - 'scripts/validate-questions.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run validate
 